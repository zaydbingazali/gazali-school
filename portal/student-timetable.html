<!DOCTYPE html>
<html>
    <head>
        <title>Timetable — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item active">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="student-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>🗓️ My Timetable</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div id="timetable-content">Loading...</div>
                </div>
            </div>
        </div>
        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadTimetable() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: student } = await db
                    .from('students')
                    .select('*')
                    .eq('user_id', user.id)
                    .single();

                if (!student) {
                    document.getElementById('timetable-content').innerHTML = '<p>No class assigned yet.</p>';
                    return;
                }

                const { data: timetable } = await db
                    .from('timetable')
                    .select('*')
                    .eq('class', student.class)
                    .order('day')
                    .order('time');

                if (timetable && timetable.length > 0) {
                    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday'];
                    let html = '<table class="timetable"><thead><tr><th>Time</th>';
                    days.forEach(d => html += `<th>${d}</th>`);
                    html += '</tr></thead><tbody>';

                    const times = [...new Set(timetable.map(t => t.time))].sort();
                    times.forEach(time => {
                        html += `<tr><td style="font-weight:700;color:#1a2744">${time}</td>`;
                        days.forEach(day => {
                            const slot = timetable.find(t => t.day === day && t.time === time);
                            html += `<td>${slot ? slot.subject : '—'}</td>`;
                        });
                        html += '</tr>';
                    });

                    html += '</tbody></table>';
                    document.getElementById('timetable-content').innerHTML = html;
                } else {
                    document.getElementById('timetable-content').innerHTML = '<p>No timetable found for your class.</p>';
                }
            }

            loadTimetable();
        </script>
    </body>
</html>
