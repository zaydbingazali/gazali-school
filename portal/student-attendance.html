<!DOCTYPE html>
<html>
    <head>
        <title>Attendance — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <script>
(function() {
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || (user.role !== 'student' && user.role !== 'parent')) window.location.href = 'login.html';
})();
</script>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item active">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="student-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>✅ Attendance</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div class="attendance-box" style="margin-bottom:24px">
                        <div class="att-stat green"><h3 id="present-count">0</h3><p>Present</p></div>
                        <div class="att-stat red"><h3 id="absent-count">0</h3><p>Absent</p></div>
                        <div class="att-stat orange"><h3 id="late-count">0</h3><p>Late</p></div>
                        <div class="att-stat blue"><h3 id="att-rate">0%</h3><p>Rate</p></div>
                    </div>
                    <div id="attendance-list">Loading...</div>
                </div>
            </div>
        </div>
        <script>
           
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            async function loadAttendance() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: attendance } = await db
                    .from('attendance')
                    .select('*')
                    .eq('student_id', user.id)
                    .order('date', { ascending: false });

                if (attendance && attendance.length > 0) {
                    let present = 0, absent = 0, late = 0;
                    let html = '<table class="timetable"><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>';
                    attendance.forEach(a => {
                        if (a.status === 'present') present++;
                        else if (a.status === 'absent') absent++;
                        else if (a.status === 'late') late++;
                        const color = a.status === 'present' ? '#00c9a7' : a.status === 'absent' ? '#e05c7a' : '#f7a84f';
                        html += `<tr>
                            <td>${a.date}</td>
                            <td style="color:${color};font-weight:700;text-transform:capitalize">${a.status}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('attendance-list').innerHTML = html;
                    document.getElementById('present-count').textContent = present;
                    document.getElementById('absent-count').textContent = absent;
                    document.getElementById('late-count').textContent = late;
                    const rate = Math.round((present / attendance.length) * 100);
                    document.getElementById('att-rate').textContent = rate + '%';
                } else {
                    document.getElementById('attendance-list').innerHTML = '<p>No attendance records yet.</p>';
                }
            }
            loadAttendance();
        </script>
    </body>
</html>
