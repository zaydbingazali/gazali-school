<!DOCTYPE html>
<html>
    <head>
        <title>Upload Files — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <script>
(function() {
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'teacher') window.location.href = 'login.html';
})();
</script>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Teacher Portal</p>
                </div>
                <nav>
                    <a href="teacher-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="teacher-profile.html" class="nav-item">👤 Profile</a>
                    <a href="teacher-students.html" class="nav-item">👨‍🎓 My Students</a>
                    <a href="teacher-grades.html" class="nav-item">📝 Enter Grades</a>
                    <a href="teacher-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="teacher-upload.html" class="nav-item active">📁 Upload Files</a>
                    <a href="teacher-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>📁 Upload Files</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div class="form-group">
                        <label>File Type</label>
                        <select id="file-type" onchange="toggleSubject()">
                            <option value="classwork">Classwork</option>
                            <option value="homework">Homework</option>
                            <option value="assignments">Assignments</option>
                            <option value="circular">Circular</option>
                        </select>
                    </div>
                    <div class="form-group" id="subject-group">
                        <label>Subject</label>
                        <select id="file-subject">
                            <option value="">-- Select Subject --</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="English">English</option>
                            <option value="Science">Science</option>
                            <option value="Islamic Studies">Islamic Studies</option>
                            <option value="Arabic">Arabic</option>
                            <option value="History">History</option>
                            <option value="Geography">Geography</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Classes</label>
                        <div style="display:flex;gap:8px;margin-bottom:8px">
                            <button type="button" onclick="selectAllClasses()" style="padding:4px 12px;border-radius:6px;border:1px solid #1a2744;background:white;cursor:pointer;font-size:12px">Select All</button>
                            <button type="button" onclick="deselectAllClasses()" style="padding:4px 12px;border-radius:6px;border:1px solid #e2e8f7;background:white;cursor:pointer;font-size:12px">Deselect All</button>
                        </div>
                        <div id="class-checkboxes" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;background:#f0f4ff;border-radius:10px">
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="1A"> Grade 1A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="1B"> Grade 1B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="2A"> Grade 2A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="2B"> Grade 2B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="3A"> Grade 3A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="3B"> Grade 3B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="4A"> Grade 4A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="4B"> Grade 4B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="5A"> Grade 5A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="5B"> Grade 5B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="6A"> Grade 6A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="6B"> Grade 6B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="7A"> Grade 7A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="7B"> Grade 7B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="8A"> Grade 8A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="8B"> Grade 8B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="9A"> Grade 9A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="9B"> Grade 9B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="10A"> Grade 10A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="10B"> Grade 10B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="11A"> Grade 11A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="11B"> Grade 11B</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="12A"> Grade 12A</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" value="12B"> Grade 12B</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Select File</label>
                        <input type="file" id="file-input">
                    </div>
                    <button onclick="uploadFile()" class="login-btn">Upload</button>
                    <p id="upload-msg"></p>

                    <h2 style="margin-top:32px">📋 Previously Uploaded</h2>
                    <div id="uploaded-list">Loading...</div>
                </div>
            </div>
        </div>
        <script>
           
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            function toggleSubject() {
                const fileType = document.getElementById('file-type').value;
                const subjectGroup = document.getElementById('subject-group');
                subjectGroup.style.display = fileType === 'circular' ? 'none' : 'block';
            }

            function selectAllClasses() {
                document.querySelectorAll('#class-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = true);
            }

            function deselectAllClasses() {
                document.querySelectorAll('#class-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
            }

            function getSelectedClasses() {
                const checked = document.querySelectorAll('#class-checkboxes input[type="checkbox"]:checked');
                return Array.from(checked).map(cb => cb.value);
            }

            async function loadUploaded() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: files } = await db.from('files').select('*').eq('uploaded_by', user.id).order('created_at', { ascending: false });

                if (files && files.length > 0) {
                    let html = '<table class="timetable"><thead><tr><th>File Name</th><th>Type</th><th>Subject</th><th>Class</th><th>Date</th><th>Action</th></tr></thead><tbody>';
                    files.forEach(f => {
                        html += `<tr>
                            <td><a href="${f.url}" target="_blank" style="color:#4f8ef7">${f.name}</a></td>
                            <td style="text-transform:capitalize">${f.type}</td>
                            <td>${f.subject || '—'}</td>
                            <td>${f.class || 'all'}</td>
                            <td>${new Date(f.created_at).toLocaleDateString()}</td>
                            <td><button onclick='deleteFile("${f.id}")' style="padding:4px 10px;border-radius:6px;border:none;background:#e05c7a;color:white;cursor:pointer;font-size:12px">🗑️ Delete</button></td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('uploaded-list').innerHTML = html;
                } else {
                    document.getElementById('uploaded-list').innerHTML = '<p>No files uploaded yet.</p>';
                }
            }

            async function deleteFile(fileId) {
                if (!confirm('Are you sure you want to delete this file?')) return;
                const { error } = await db.from('files').delete().eq('id', fileId);
                if (error) {
                    alert('❌ Error: ' + error.message);
                } else {
                    loadUploaded();
                }
            }

            async function uploadFile() {
                const user = JSON.parse(localStorage.getItem('user'));
                const fileType = document.getElementById('file-type').value;
                const fileSubject = document.getElementById('file-subject') ? document.getElementById('file-subject').value : null;
                const selectedClasses = getSelectedClasses();
                const fileInput = document.getElementById('file-input');
                const file = fileInput.files[0];

                if (!file) {
                    document.getElementById('upload-msg').textContent = '⚠️ Please select a file!';
                    return;
                }

                if (fileType !== 'circular' && !fileSubject) {
                    document.getElementById('upload-msg').textContent = '⚠️ Please select a subject!';
                    return;
                }

                if (selectedClasses.length === 0) {
                    document.getElementById('upload-msg').textContent = '⚠️ Please select at least one class!';
                    return;
                }

                document.getElementById('upload-msg').textContent = '⏳ Uploading...';

                const fileName = Date.now() + '_' + file.name;
                const { error: storageError } = await db.storage.from('files').upload(fileName, file, { upsert: true });

                if (storageError) {
                    document.getElementById('upload-msg').textContent = '❌ Storage error: ' + storageError.message;
                    return;
                }

                const { data: urlData } = db.storage.from('files').getPublicUrl(fileName);

                const inserts = selectedClasses.map(cls => ({
                    name: file.name,
                    type: fileType,
                    subject: fileType !== 'circular' ? fileSubject : null,
                    url: urlData.publicUrl,
                    uploaded_by: user.id,
                    class: cls
                }));

                const { error: dbError } = await db.from('files').insert(inserts);

                if (dbError) {
                    document.getElementById('upload-msg').textContent = '❌ Database error: ' + dbError.message;
                    return;
                }

                document.getElementById('upload-msg').textContent = '✅ Uploaded to ' + selectedClasses.length + ' class(es)!';
                document.getElementById('file-input').value = '';
                deselectAllClasses();
                loadUploaded();
            }

            loadUploaded();
        </script>
    </body>
</html>
