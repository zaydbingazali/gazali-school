<!DOCTYPE html>
<html>
    <head>
        <title>Profile — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item active">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>👤 My Profile</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div class="profile-card">
                        <div class="profile-avatar">👤</div>
                        <div class="profile-info">
                            <table class="grades-table">
                                <tr><td><b>Name</b></td><td id="p-name">—</td></tr>
                                <tr><td><b>Email</b></td><td id="p-email">—</td></tr>
                                <tr><td><b>Registration No.</b></td><td id="p-regno">—</td></tr>
                                <tr><td><b>Date of Birth</b></td><td id="p-dob">—</td></tr>
                                <tr><td><b>National ID</b></td><td id="p-natid">—</td></tr>
                                <tr><td><b>Class</b></td><td id="p-class">—</td></tr>
                                <tr><td><b>Grade Level</b></td><td id="p-grade">—</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            async function loadProfile() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                document.getElementById('p-email').textContent = user.email;

                const { data: student } = await db
                    .from('students')
                    .select('*')
                    .eq('user_id', user.id)
                    .single();

                if (student) {
                    document.getElementById('p-name').textContent = student.name || '—';
                    document.getElementById('p-regno').textContent = student.reg_no || '—';
                    document.getElementById('p-dob').textContent = student.dob || '—';
                    document.getElementById('p-natid').textContent = student.national_id || '—';
                    document.getElementById('p-class').textContent = student.class || '—';
                    document.getElementById('p-grade').textContent = student.grade_level || '—';
                }
            }
            loadProfile();
        </script>
    </body>
</html>
