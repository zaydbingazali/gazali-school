<!DOCTYPE html>
<html>
    <head>
        <title>Principal Dashboard — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Principal Portal</p>
                </div>
                <nav>
                    <a href="principal-dashboard.html" class="nav-item active">🏠 Dashboard</a>
                    <a href="principal-students.html" class="nav-item">👨‍🎓 Students</a>
                    <a href="principal-teachers.html" class="nav-item">👩‍🏫 Teachers</a>
                    <a href="principal-grades.html" class="nav-item">📊 Grades</a>
                    <a href="principal-attendance.html" class="nav-item">📋 Attendance</a>
                    <a href="principal-announcements.html" class="nav-item">📢 Announcements</a>
                    <a href="principal-adduser.html" class="nav-item">➕ Add User</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1 id="welcome-msg">Welcome, Principal! 👋</h1>
                    <p>Gazali International School</p>
                </div>

                <div class="subject-cards">
                    <div class="subject-card">
                        <span class="subject-name">Total Students</span>
                        <span class="subject-score" id="total-students">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#00c9a7,#00a88a)">
                        <span class="subject-name">Total Teachers</span>
                        <span class="subject-score" id="total-teachers">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#f7a84f,#d4851a)">
                        <span class="subject-name">Total Users</span>
                        <span class="subject-score" id="total-users">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#e05c7a,#c4415e)">
                        <span class="subject-name">Fees Pending</span>
                        <span class="subject-score" id="fees-pending">0</span>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="section">
                        <h2>👨‍🎓 Recent Students</h2>
                        <div id="recent-students">Loading...</div>
                    </div>
                    <div class="section">
                        <h2>📅 Calendar</h2>
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            const user = requireAuth(['principal']);
if (!user) return;
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadDashboard() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                document.getElementById('welcome-msg').textContent = 'Welcome, Principal! 👋';

                const { data: students } = await db.from('students').select('*');
                if (students) {
                    document.getElementById('total-students').textContent = students.length;
                    let html = '<table class="timetable"><thead><tr><th>Name</th><th>Class</th></tr></thead><tbody>';
                    students.slice(0, 5).forEach(s => {
                        html += `<tr><td>${s.name || '—'}</td><td>${s.class || '—'}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('recent-students').innerHTML = html;
                }

                const { data: teachers } = await db.from('users').select('*').eq('role', 'teacher');
                if (teachers) document.getElementById('total-teachers').textContent = teachers.length;

                const { data: users } = await db.from('users').select('*');
                if (users) document.getElementById('total-users').textContent = users.length;

                const { data: fees } = await db.from('fees').select('*').neq('status', 'paid');
                if (fees) document.getElementById('fees-pending').textContent = fees.length;

                renderCalendar();
            }

            function renderCalendar() {
                const now = new Date();
                const month = now.toLocaleString('default', { month: 'long' });
                const year = now.getFullYear();
                const daysInMonth = new Date(year, now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(year, now.getMonth(), 1).getDay();
                let html = `<div class="calendar-header">${month} ${year}</div><div class="calendar-grid">`;
                ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => html += `<div class="cal-day-name">${d}</div>`);
                for (let i = 0; i < firstDay; i++) html += '<div></div>';
                for (let d = 1; d <= daysInMonth; d++) {
                    html += `<div class="cal-day ${d === now.getDate() ? 'today' : ''}">${d}</div>`;
                }
                html += '</div>';
                document.getElementById('calendar').innerHTML = html;
            }

            loadDashboard();
        </script>
    </body>
</html>
