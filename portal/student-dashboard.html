<!DOCTYPE html>
<html>
    <head>
        <title>Student Dashboard — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item active">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1 id="welcome-msg">Welcome! 👋</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="subject-cards" id="subject-cards">Loading grades...</div>
                <div class="dashboard-grid">
                    <div class="section">
                        <h2>📅 Calendar</h2>
                        <div id="calendar"></div>
                    </div>
                    <div class="section">
                        <h2>📢 Upcoming Events</h2>
                        <div id="events-list">No upcoming events.</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadDashboard() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.email + '! 👋';

                const { data: grades } = await db
                    .from('grades')
                    .select('*')
                    .eq('student_id', user.id);

                if (grades && grades.length > 0) {
                    let html = '';
                    grades.forEach(g => {
                        html += `<div class="subject-card">
                            <span class="subject-name">${g.subject}</span>
                            <span class="subject-score">${g.score}</span>
                        </div>`;
                    });
                    document.getElementById('subject-cards').innerHTML = html;
                } else {
                    document.getElementById('subject-cards').innerHTML = '<p>No grades yet.</p>';
                }

                renderCalendar();
            }

            function renderCalendar() {
                const now = new Date();
                const month = now.toLocaleString('default', { month: 'long' });
                const year = now.getFullYear();
                const daysInMonth = new Date(year, now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(year, now.getMonth(), 1).getDay();

                let html = `<div class="calendar-header">${month} ${year}</div>`;
                html += '<div class="calendar-grid">';
                ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                    html += `<div class="cal-day-name">${d}</div>`;
                });
                for (let i = 0; i < firstDay; i++) html += '<div></div>';
                for (let d = 1; d <= daysInMonth; d++) {
                    const isToday = d === now.getDate();
                    html += `<div class="cal-day ${isToday ? 'today' : ''}">${d}</div>`;
                }
                html += '</div>';
                document.getElementById('calendar').innerHTML = html;
            }

            loadDashboard();
        </script>
    </body>
</html>
