<!DOCTYPE html>
<html>
    <head>
        <title>Teachers — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Principal Portal</p>
                </div>
                <nav>
                    <a href="principal-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="principal-students.html" class="nav-item">👨‍🎓 Students</a>
                    <a href="principal-teachers.html" class="nav-item active">👩‍🏫 Teachers</a>
                    <a href="principal-grades.html" class="nav-item">📊 Grades</a>
                    <a href="principal-attendance.html" class="nav-item">📋 Attendance</a>
                    <a href="principal-announcements.html" class="nav-item">📢 Announcements</a>
                    <a href="principal-adduser.html" class="nav-item">➕ Add User</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>👩‍🏫 Search Teachers</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div class="form-group" style="max-width:400px">
                        <input type="text" id="teacher-search" placeholder="Search by email..." oninput="searchTeachers()">
                    </div>
                    <div id="teachers-list">Type to search...</div>
                </div>
            </div>
        </div>
        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let allTeachers = [];

            async function load() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }
                const { data: teachers } = await db.from('users').select('*').eq('role', 'teacher');
                if (teachers) allTeachers = teachers;
            }

            function searchTeachers() {
                const query = document.getElementById('teacher-search').value.toLowerCase();
                if (!query) { document.getElementById('teachers-list').innerHTML = 'Type to search...'; return; }
                const filtered = allTeachers.filter(t => t.email && t.email.toLowerCase().includes(query));
                if (filtered.length > 0) {
                    let html = '<table class="timetable"><thead><tr><th>Email</th><th>Role</th></tr></thead><tbody>';
                    filtered.forEach(t => {
                        html += `<tr><td>${t.email}</td><td>${t.role}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('teachers-list').innerHTML = html;
                } else {
                    document.getElementById('teachers-list').innerHTML = '<p>No teachers found.</p>';
                }
            }

            load();
        </script>
    </body>
</html>
