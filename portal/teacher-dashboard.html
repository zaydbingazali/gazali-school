<!DOCTYPE html>
<html>
    <head>
        <title>Teacher Dashboard — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <script>
(function() {
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'principal') window.location.href = 'login.html';
})();
</script>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Teacher Portal</p>
                </div>
                <nav>
                    <a href="teacher-dashboard.html" class="nav-item active">🏠 Dashboard</a>
                    <a href="teacher-students.html" class="nav-item">👨‍🎓 My Students</a>
                    <a href="teacher-grades.html" class="nav-item">📝 Enter Grades</a>
                    <a href="teacher-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="teacher-upload.html" class="nav-item">📁 Upload Files</a>
                    <a href="teacher-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1 id="welcome-msg">Welcome, Teacher! 👋</h1>
                    <p>Gazali International School</p>
                </div>

                <div class="subject-cards">
                    <div class="subject-card">
                        <span class="subject-name">Total Students</span>
                        <span class="subject-score" id="total-students">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#00c9a7,#00a88a)">
                        <span class="subject-name">Present Today</span>
                        <span class="subject-score" id="present-today">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#e05c7a,#c4415e)">
                        <span class="subject-name">Absent Today</span>
                        <span class="subject-score" id="absent-today">0</span>
                    </div>
                    <div class="subject-card" style="background:linear-gradient(135deg,#f7a84f,#d4851a)">
                        <span class="subject-name">Files Uploaded</span>
                        <span class="subject-score" id="files-uploaded">0</span>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="section">
                        <h2>👨‍🎓 Recent Students</h2>
                        <div id="recent-students">Loading...</div>
                    </div>
                    <div class="section">
                        <h2>📅 Today's Date</h2>
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
           
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadDashboard() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.email + '! 👋';

                const { data: students } = await db.from('students').select('*');
                if (students) {
                    document.getElementById('total-students').textContent = students.length;
                    let html = '<table class="timetable"><thead><tr><th>Name</th><th>Class</th></tr></thead><tbody>';
                    students.slice(0, 5).forEach(s => {
                        html += `<tr><td>${s.name || '—'}</td><td>${s.class || '—'}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('recent-students').innerHTML = html;
                }

                const today = new Date().toISOString().split('T')[0];
                const { data: attendance } = await db.from('attendance').select('*').eq('date', today);
                if (attendance) {
                    const present = attendance.filter(a => a.status === 'present').length;
                    const absent = attendance.filter(a => a.status === 'absent').length;
                    document.getElementById('present-today').textContent = present;
                    document.getElementById('absent-today').textContent = absent;
                }

                const { data: files } = await db.from('files').select('*').eq('uploaded_by', user.id);
                if (files) document.getElementById('files-uploaded').textContent = files.length;

                renderCalendar();
            }

            function renderCalendar() {
                const now = new Date();
                const month = now.toLocaleString('default', { month: 'long' });
                const year = now.getFullYear();
                const daysInMonth = new Date(year, now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(year, now.getMonth(), 1).getDay();

                let html = `<div class="calendar-header">${month} ${year}</div>`;
                html += '<div class="calendar-grid">';
                ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                    html += `<div class="cal-day-name">${d}</div>`;
                });
                for (let i = 0; i < firstDay; i++) html += '<div></div>';
                for (let d = 1; d <= daysInMonth; d++) {
                    const isToday = d === now.getDate();
                    html += `<div class="cal-day ${isToday ? 'today' : ''}">${d}</div>`;
                }
                html += '</div>';
                document.getElementById('calendar').innerHTML = html;
            }

            loadDashboard();
        </script>
    </body>
</html>
