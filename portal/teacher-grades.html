<!DOCTYPE html>
<html>
    <head>
        <title>Enter Grades — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>
        <script>
(function() {
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'teacher') window.location.href = 'login.html';
})();
</script>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Teacher Portal</p>
                </div>
                <nav>
                    <a href="teacher-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="teacher-profile.html" class="nav-item">👤 Profile</a>
                    <a href="teacher-students.html" class="nav-item">👨‍🎓 My Students</a>
                    <a href="teacher-grades.html" class="nav-item active">📝 Enter Grades</a>
                    <a href="teacher-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="teacher-upload.html" class="nav-item">📁 Upload Files</a>
                    <a href="teacher-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>📝 Enter Grades</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div class="form-group">
                        <label>Select Student</label>
                        <select id="grade-student-id" onchange="loadStudentGrades()">
                            <option value="">-- Select Student --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Term</label>
                        <select id="grade-term">
                            <option value="1">Term 1</option>
                            <option value="2">Term 2</option>
                            <option value="3">Term 3</option>
                        </select>
                    </div>

                    <div id="grades-entry-table" style="display:none">
                        <h3 style="margin:20px 0 12px;color:#1a2744">Enter Scores for All Subjects</h3>
                        <table class="timetable">
                            <thead>
                                <tr>
                                    <th>Subject</th>
                                    <th>Score /100</th>
                                    <th>Current Grade</th>
                                </tr>
                            </thead>
                            <tbody id="subjects-rows"></tbody>
                        </table>
                        <button onclick="saveAllGrades()" class="login-btn" style="margin-top:16px">💾 Save All Grades</button>
                        <p id="grade-msg"></p>
                    </div>
                </div>
            </div>
        </div>
        <script>
            
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const subjects = ['Mathematics', 'English', 'Science', 'Islamic Studies', 'Arabic', 'History', 'Geography'];

            async function loadStudents() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: students } = await db.from('students').select('*');
                if (students && students.length > 0) {
                    let dropdown = document.getElementById('grade-student-id');
                    students.forEach(s => {
                        dropdown.innerHTML += `<option value="${s.user_id}">${s.name || s.user_id}</option>`;
                    });
                }
            }

            async function loadStudentGrades() {
                const studentId = document.getElementById('grade-student-id').value;
                const term = document.getElementById('grade-term').value;
                if (!studentId) { document.getElementById('grades-entry-table').style.display = 'none'; return; }

                const { data: existing } = await db
                    .from('grades')
                    .select('*')
                    .eq('student_id', studentId)
                    .eq('term', term);

                let rows = '';
                subjects.forEach(subject => {
                    const found = existing ? existing.find(g => g.subject === subject) : null;
                    const score = found ? found.score : '';
                    const letter = found ? (found.score >= 90 ? 'A+' : found.score >= 80 ? 'A' : found.score >= 70 ? 'B' : found.score >= 60 ? 'C' : 'F') : '—';
                    const color = found ? (found.score >= 80 ? '#00c9a7' : found.score >= 60 ? '#f7a84f' : '#e05c7a') : '#999';
                    rows += `<tr>
                        <td style="font-weight:600">${subject}</td>
                        <td><input type="number" id="score-${subject.replace(/ /g,'-')}" value="${score}" min="0" max="100" placeholder="0-100" style="width:80px;padding:6px;border-radius:6px;border:1.5px solid #e2e8f7;font-family:inherit;font-size:14px"></td>
                        <td style="color:${color};font-weight:700">${letter}</td>
                    </tr>`;
                });

                document.getElementById('subjects-rows').innerHTML = rows;
                document.getElementById('grades-entry-table').style.display = 'block';
            }

            async function saveAllGrades() {
                const studentId = document.getElementById('grade-student-id').value;
                const term = document.getElementById('grade-term').value;

                if (!studentId) {
                    document.getElementById('grade-msg').textContent = '⚠️ Please select a student!';
                    return;
                }

                document.getElementById('grade-msg').textContent = '⏳ Saving...';

                for (const subject of subjects) {
                    const scoreEl = document.getElementById('score-' + subject.replace(/ /g, '-'));
                    const score = scoreEl ? scoreEl.value : '';
                    if (!score) continue;

                    const { data: existing } = await db
                        .from('grades')
                        .select('*')
                        .eq('student_id', studentId)
                        .eq('subject', subject)
                        .eq('term', term)
                        .single();

                    if (existing) {
                        await db.from('grades').update({ score: parseInt(score) }).eq('id', existing.id);
                    } else {
                        await db.from('grades').insert({
                            student_id: studentId,
                            subject: subject,
                            score: parseInt(score),
                            term: term
                        });
                    }
                }

                document.getElementById('grade-msg').textContent = '✅ All grades saved!';
                loadStudentGrades();
            }

            loadStudents();
        </script>
    </body>
</html>
