<!DOCTYPE html>
<html>
    <head>
        <title>Login — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
    </head>
    <body>

        <div class="login-wrapper">
            <div class="login-box">

                <div class="login-logo">
                    <h2>🎓 Gazali International School</h2>
                    <p>Sign in to your account</p>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <button onclick="login()" class="login-btn">Sign In</button>
                <p style="text-align:center;margin-top:16px;font-size:14px;color:#999">New student? <a href="register.html" style="color:#4f8ef7;font-weight:600">Register here</a></p>

                <p id="error-msg"></p>

            </div>
        </div>

        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function login() {
                let username = document.getElementById('username').value;
                let password = document.getElementById('password').value;

                if (username === '' || password === '') {
                    document.getElementById('error-msg').textContent = '⚠️ Please fill in all fields!';
                    return;
                }

                const { data, error } = await db
                    .from('users')
                    .select('*')
                    .eq('email', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    document.getElementById('error-msg').textContent = '❌ Wrong username or password!';
                    return;
                }

                if (data.status === 'pending') {
                    document.getElementById('error-msg').textContent = '⏳ Your account is pending admin approval. Please wait!';
                    return;
                }

                localStorage.setItem('user', JSON.stringify(data));

                if (data.role === 'student' || data.role === 'parent') {
                    window.location.href = 'student-dashboard.html';
                } else if (data.role === 'teacher') {
                    window.location.href = 'teacher-dashboard.html';
                } else if (data.role === 'principal') {
                    window.location.href = 'principal-dashboard.html';
                } else if (data.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                }
            }
        </script>

    </body>
</html>
