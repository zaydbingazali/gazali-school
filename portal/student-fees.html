<!DOCTYPE html>
<html>
    <head>
        <title>Fees — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="config.js"></script>
        <a href="student-fees.html" class="nav-item">💰 Fees</a>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item active">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>💰 Fee Structure</h1>
                    <p>Gazali International School</p>
                </div>

                <div class="attendance-box" style="margin-bottom:24px">
                    <div class="att-stat blue">
                        <h3 id="total-fees">0</h3>
                        <p>Total Fees</p>
                    </div>
                    <div class="att-stat green">
                        <h3 id="total-paid">0</h3>
                        <p>Total Paid</p>
                    </div>
                    <div class="att-stat red">
                        <h3 id="total-balance">0</h3>
                        <p>Balance Due</p>
                    </div>
                </div>

                <div class="section">
                    <h2>📋 Payment History</h2>
                    <div id="fees-list">Loading...</div>
                </div>
            </div>
        </div>

        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadFees() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: fees } = await db
                    .from('fees')
                    .select('*')
                    .eq('student_id', user.id)
                    .order('created_at');

                if (fees && fees.length > 0) {
                    let totalFees = 0, totalPaid = 0;

                    let html = `<table class="timetable">
                        <thead>
                            <tr>
                                <th>Term</th>
                                <th>Amount</th>
                                <th>Paid</th>
                                <th>Balance</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Receipt</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    fees.forEach(f => {
                        totalFees += f.amount;
                        totalPaid += f.paid;
                        const balance = f.amount - f.paid;
                        const statusColor = f.status === 'paid' ? '#00c9a7' : f.status === 'partial' ? '#f7a84f' : '#e05c7a';

                        html += `<tr>
                            <td style="font-weight:700">${f.term}</td>
                            <td>₹${f.amount.toLocaleString()}</td>
                            <td style="color:#00c9a7;font-weight:700">₹${f.paid.toLocaleString()}</td>
                            <td style="color:#e05c7a;font-weight:700">₹${balance.toLocaleString()}</td>
                            <td>${f.due_date}</td>
                            <td><span style="background:${statusColor}22;color:${statusColor};padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:capitalize">${f.status}</span></td>
                            <td>${f.status === 'paid' ? `<button onclick='downloadReceipt("${f.term}", ${f.amount})' style="padding:5px 12px;border-radius:6px;border:none;background:#1a2744;color:white;cursor:pointer;font-size:12px">⬇ Receipt</button>` : '—'}</td>
                        </tr>`;
                    });

                    html += '</tbody></table>';
                    document.getElementById('fees-list').innerHTML = html;
                    document.getElementById('total-fees').textContent = '₹' + totalFees.toLocaleString();
                    document.getElementById('total-paid').textContent = '₹' + totalPaid.toLocaleString();
                    document.getElementById('total-balance').textContent = '₹' + (totalFees - totalPaid).toLocaleString();
                } else {
                    document.getElementById('fees-list').innerHTML = '<p>No fee records found.</p>';
                }
            }

            function downloadReceipt(term, amount) {
    const user = JSON.parse(localStorage.getItem('user'));
    const doc = new window.jspdf.jsPDF();

    doc.setFillColor(26, 39, 68);
    doc.rect(0, 0, 210, 40, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text('Gazali International School', 105, 18, { align: 'center' });
    doc.setFontSize(12);
    doc.setFont('helvetica', 'normal');
    doc.text('Fee Payment Receipt', 105, 30, { align: 'center' });

    doc.setTextColor(0, 0, 0);
    doc.setFontSize(11);

    const startY = 60;
    const lineH = 10;

    doc.setFont('helvetica', 'bold');
    doc.text('Receipt Details', 20, startY);
    doc.setLineWidth(0.5);
    doc.line(20, startY + 2, 190, startY + 2);

    doc.setFont('helvetica', 'normal');
    const details = [
        ['Student Email:', user.email],
        ['Term:', term],
        ['Amount Paid:', '₹' + amount.toLocaleString()],
        ['Payment Date:', new Date().toLocaleDateString()],
        ['Payment Status:', 'PAID'],
        ['Receipt No.:', 'GIS-' + Date.now()],
    ];

    details.forEach((d, i) => {
        doc.setFont('helvetica', 'bold');
        doc.text(d[0], 20, startY + 15 + (i * lineH));
        doc.setFont('helvetica', 'normal');
        doc.text(d[1], 90, startY + 15 + (i * lineH));
    });

    doc.setFillColor(240, 244, 255);
    doc.rect(20, startY + 75, 170, 15, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(26, 39, 68);
    doc.text('Total Amount Paid: ₹' + amount.toLocaleString(), 105, startY + 85, { align: 'center' });

    doc.setTextColor(150, 150, 150);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('This is a computer generated receipt and does not require a signature.', 105, 270, { align: 'center' });
    doc.text('Gazali International School © 2026', 105, 278, { align: 'center' });

    doc.save('Receipt_' + term + '.pdf');
}

            loadFees();
        </script>
    </body>
</html>
