<!DOCTYPE html>
<html>
    <head>
        <title>Messages — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
        <style>
            .chat-wrapper {
                display: grid;
                grid-template-columns: 280px 1fr;
                gap: 20px;
                height: 70vh;
            }
            .chat-sidebar {
                background: white;
                border-radius: 16px;
                border: 1.5px solid #e2e8f7;
                overflow-y: auto;
            }
            .chat-sidebar-header {
                padding: 16px;
                border-bottom: 1.5px solid #e2e8f7;
                font-weight: 700;
                color: #1a2744;
            }
            .chat-person {
                padding: 14px 16px;
                cursor: pointer;
                border-bottom: 1px solid #f0f4ff;
                display: flex;
                align-items: center;
                gap: 12px;
                transition: background 0.2s;
            }
            .chat-person:hover { background: #f0f4ff; }
            .chat-person.active { background: #e8effe; }
            .chat-person-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: linear-gradient(135deg, #1a2744, #4f8ef7);
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: 700;
                font-size: 16px;
                flex-shrink: 0;
            }
            .chat-person-info { flex: 1; min-width: 0; }
            .chat-person-name {
                font-weight: 600;
                color: #1a2744;
                font-size: 14px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .chat-person-preview {
                font-size: 12px;
                color: #999;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .unread-badge {
                background: #4f8ef7;
                color: white;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                font-size: 11px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                flex-shrink: 0;
            }
            .chat-main {
                background: white;
                border-radius: 16px;
                border: 1.5px solid #e2e8f7;
                display: flex;
                flex-direction: column;
            }
            .chat-header {
                padding: 16px 20px;
                border-bottom: 1.5px solid #e2e8f7;
                font-weight: 700;
                color: #1a2744;
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .chat-bubble {
                max-width: 65%;
                padding: 10px 14px;
                border-radius: 16px;
                font-size: 14px;
                line-height: 1.5;
            }
            .chat-bubble.sent {
                background: linear-gradient(135deg, #1a2744, #4f8ef7);
                color: white;
                align-self: flex-end;
                border-bottom-right-radius: 4px;
            }
            .chat-bubble.received {
                background: #f0f4ff;
                color: #1a2744;
                align-self: flex-start;
                border-bottom-left-radius: 4px;
            }
            .chat-bubble-time {
                font-size: 10px;
                opacity: 0.7;
                margin-top: 4px;
                text-align: right;
            }
            .chat-input-area {
                padding: 16px;
                border-top: 1.5px solid #e2e8f7;
                display: flex;
                gap: 10px;
            }
            .chat-input {
                flex: 1;
                padding: 10px 14px;
                border-radius: 24px;
                border: 1.5px solid #e2e8f7;
                font-family: inherit;
                font-size: 14px;
                outline: none;
            }
            .chat-input:focus { border-color: #4f8ef7; }
            .chat-send-btn {
                background: linear-gradient(135deg, #1a2744, #4f8ef7);
                color: white;
                border: none;
                border-radius: 50%;
                width: 42px;
                height: 42px;
                cursor: pointer;
                font-size: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .chat-empty {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #999;
                font-size: 15px;
            }
        </style>
    </head>
    <body>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item">📢 Circulars</a>
                    <a href="student-messages.html" class="nav-item active">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>💬 Messages</h1>
                    <p>Gazali International School</p>
                </div>

                <div class="chat-wrapper">
                    <div class="chat-sidebar">
                        <div class="chat-sidebar-header">👩‍🏫 Teachers</div>
<div style="padding:10px">
    <input type="text" id="people-search" placeholder="Search teachers..." oninput="filterList()" style="width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f7;font-family:inherit;font-size:13px;box-sizing:border-box;outline:none">
</div>
<div id="teachers-list">Loading...</div>
                    </div>
                    <div class="chat-main" id="chat-main">
                        <div class="chat-empty">👈 Select a teacher to start chatting</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const user = requireAuth(['student', 'parent']);
if (!user) return;
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let currentUser = null;
            let selectedTeacher = null;
            let allTeachers = [];
            let pollInterval = null;

            async function load() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }
                currentUser = user;

                const { data: teachers } = await db.from('users').select('*').eq('role', 'teacher');
                if (teachers) {
                    allTeachers = teachers;
                    renderTeacherList(teachers);
                }
            }

            async function renderTeacherList(teachers) {
                const { data: allMessages } = await db
                    .from('messages')
                    .select('*')
                    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);

                let html = '';
                teachers.forEach(t => {
                    const convo = allMessages ? allMessages.filter(m =>
                        m.sender_id === t.id || m.receiver_id === t.id
                    ) : [];
                    const lastMsg = convo.length > 0 ? convo[convo.length - 1] : null;
                    const unread = allMessages ? allMessages.filter(m =>
                        m.sender_id === t.id && m.receiver_id === currentUser.id && !m.read
                    ).length : 0;

                    const initial = t.email[0].toUpperCase();
                    html += `<div class="chat-person ${selectedTeacher && selectedTeacher.id === t.id ? 'active' : ''}" onclick="openChat('${t.id}', '${t.email}')">
                        <div class="chat-person-avatar">${initial}</div>
                        <div class="chat-person-info">
                            <div class="chat-person-name">${t.email}</div>
                            <div class="chat-person-preview">${lastMsg ? lastMsg.message.substring(0, 30) + (lastMsg.message.length > 30 ? '...' : '') : 'No messages yet'}</div>
                        </div>
                        ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                    </div>`;
                });
                document.getElementById('teachers-list').innerHTML = html;
            }

            async function openChat(teacherId, teacherEmail) {
                selectedTeacher = allTeachers.find(t => t.id === teacherId);

                document.getElementById('chat-main').innerHTML = `
                    <div class="chat-header">
                        <div class="chat-person-avatar" style="width:36px;height:36px;font-size:14px">${teacherEmail[0].toUpperCase()}</div>
                        ${teacherEmail}
                    </div>
                    <div class="chat-messages" id="chat-messages">Loading...</div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
                        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
                    </div>
                `;

                await loadMessages(teacherId);
                renderTeacherList(allTeachers);

                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(() => loadMessages(teacherId), 3000);
            }

            async function loadMessages(teacherId) {
                const { data: messages } = await db
                    .from('messages')
                    .select('*')
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${teacherId}),and(sender_id.eq.${teacherId},receiver_id.eq.${currentUser.id})`)
                    .order('created_at', { ascending: true });

                await db.from('messages')
                    .update({ read: true })
                    .eq('sender_id', teacherId)
                    .eq('receiver_id', currentUser.id)
                    .eq('read', false);

                const container = document.getElementById('chat-messages');
                if (!container) return;

                if (messages && messages.length > 0) {
                    let html = '';
                    messages.forEach(m => {
                        const isSent = m.sender_id === currentUser.id;
                        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        html += `<div class="chat-bubble ${isSent ? 'sent' : 'received'}">
                            ${m.message}
                            <div class="chat-bubble-time">${time} ${isSent ? (m.read ? '✓✓' : '✓') : ''}</div>
                        </div>`;
                    });
                    container.innerHTML = html;
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = '<div style="text-align:center;color:#999;margin-top:40px">No messages yet. Say hi! 👋</div>';
                }
            }

            async function sendMessage() {
                if (!selectedTeacher) return;
                const input = document.getElementById('chat-input');
                const message = input.value.trim();
                if (!message) return;

                input.value = '';

                const { error } = await db.from('messages').insert({
                    sender_id: currentUser.id,
                    receiver_id: selectedTeacher.id,
                    message: message
                });

                if (!error) {
                    await loadMessages(selectedTeacher.id);
                    renderTeacherList(allTeachers);
                }
            }

            function filterList() {
    const query = document.getElementById('people-search').value.toLowerCase();
    const filtered = allTeachers.filter(t =>
        t.email && t.email.toLowerCase().includes(query)
    );
    renderTeacherList(filtered);
}

            load();
        </script>
    </body>
</html>
