<!DOCTYPE html>
<html>
    <head>
        <title>Circulars — Gazali International School</title>
        <link rel="stylesheet" href="portal.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="config.js"></script>
        <style>
            .file-list { display: flex; flex-direction: column; }
            .file-item {
                display: flex;
                align-items: center;
                padding: 14px 16px;
                border-bottom: 1px solid #f0f4ff;
                gap: 16px;
                cursor: pointer;
                text-decoration: none;
                color: inherit;
                transition: background 0.15s;
            }
            .file-item:hover { background: #f8f9ff; }
            .file-date-badge {
                background: #4f8ef7;
                color: white;
                border-radius: 6px 12px 12px 6px;
                padding: 5px 14px 5px 10px;
                font-size: 12px;
                font-weight: 600;
                white-space: nowrap;
                min-width: 90px;
                text-align: center;
            }
            .file-name {
                flex: 1;
                font-size: 14px;
                color: #1a2744;
            }
            .file-name.unread { font-weight: 700; }
            .file-name.read { font-weight: 400; color: #555; }
            .file-eye { color: #bbb; font-size: 18px; }
            .file-subject-tag {
                font-size: 11px;
                background: #f0f4ff;
                color: #4f8ef7;
                padding: 3px 10px;
                border-radius: 20px;
                font-weight: 600;
                white-space: nowrap;
            }
        </style>
    </head>
    <body>
        <script>
        (function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || (user.role !== 'student' && user.role !== 'parent')) window.location.href = 'login.html';
        })();
        </script>
        <div class="portal-wrapper">
            <div class="sidebar">
                <div class="sidebar-logo">
                    <h2>🎓 Gazali</h2>
                    <p class="role-tag">Student Portal</p>
                </div>
                <nav>
                    <a href="student-dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="student-profile.html" class="nav-item">👤 Profile</a>
                    <a href="student-classwork.html" class="nav-item">📖 Classwork</a>
                    <a href="student-homework.html" class="nav-item">📝 Homework</a>
                    <a href="student-assignments.html" class="nav-item">📋 Assignments</a>
                    <a href="student-grades.html" class="nav-item">📊 Grades</a>
                    <a href="student-attendance.html" class="nav-item">✅ Attendance</a>
                    <a href="student-timetable.html" class="nav-item">🗓️ Timetable</a>
                    <a href="student-fees.html" class="nav-item">💰 Fees</a>
                    <a href="student-circulars.html" class="nav-item active">📢 Circulars</a>
                    <a href="student-messages.html" class="nav-item">💬 Messages</a>
                    <a href="login.html" class="nav-item logout">🚪 Logout</a>
                </nav>
            </div>
            <div class="main-content">
                <div class="topbar">
                    <h1>📢 Circulars</h1>
                    <p>Gazali International School</p>
                </div>
                <div class="section">
                    <div id="circulars-list">Loading...</div>
                </div>
            </div>
        </div>
        <script>
            const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function loadCirculars() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) { window.location.href = 'login.html'; return; }

                const { data: student } = await db.from('students').select('*').eq('user_id', user.id).single();
                const studentClass = student ? student.class : null;

                const { data: files } = await db
                    .from('files')
                    .select('*')
                    .eq('type', 'circular')
                    .or(studentClass ? `class.eq.${studentClass},class.eq.all` : 'class.eq.all')
                    .order('created_at', { ascending: false });

                const { data: reads } = await db
                    .from('file_reads')
                    .select('file_id')
                    .eq('user_id', user.id);

                const readIds = reads ? reads.map(r => r.file_id) : [];

                if (files && files.length > 0) {
                    let html = '<div class="file-list">';
                    files.forEach(f => {
                        const isRead = readIds.includes(f.id);
                        const dateStr = new Date(f.created_at).toLocaleDateString('en-GB').replace(/\//g, '-');
                        html += `<a href="${f.url}" target="_self" class="file-item" onclick="markRead('${f.id}', '${user.id}')">
                            <div class="file-date-badge">${dateStr}</div>
                            <div class="file-name ${isRead ? 'read' : 'unread'}">${f.name}</div>
                            <span class="file-eye">👁</span>
                        </a>`;
                    });
                    html += '</div>';
                    document.getElementById('circulars-list').innerHTML = html;
                } else {
                    document.getElementById('circulars-list').innerHTML = '<p>No circulars yet.</p>';
                }
            }

            async function markRead(fileId, userId) {
                const { data: existing } = await db
                    .from('file_reads')
                    .select('*')
                    .eq('file_id', fileId)
                    .eq('user_id', userId)
                    .single();
                if (!existing) {
                    await db.from('file_reads').insert({ file_id: fileId, user_id: userId });
                }
            }

            loadCirculars();
        </script>
    </body>
</html>
